name: Ferrytoll
options:
  bundleIdPrefix: com.shimondeitel.ferrycost
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Ferrytoll:
    type: application
    platform: iOS
    sources:
      - path: Ferrytoll
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ferrycost
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Ferrytoll/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  FerrytollTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FerrytollTests
      - path: Ferrytoll.storekit
    dependencies:
      - target: Ferrytoll
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ferrycost.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  FerrytollUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FerrytollUITests
    dependencies:
      - target: Ferrytoll
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ferrycost.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Ferrytoll:
    build:
      targets:
        Ferrytoll: all
        FerrytollTests: [test]
        FerrytollUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Ferrytoll.storekit
    test:
      config: Debug
      storeKitConfiguration: Ferrytoll.storekit
      targets:
        - FerrytollTests
        - FerrytollUITests
    archive:
      config: Release
